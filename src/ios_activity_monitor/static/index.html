<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iOS Activity Monitor</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="bar">
      <h1>iOS Activity Monitor</h1>
      <div class="bar-right">
        <label class="rate-select">
          <span>UI refresh</span>
          <select id="ui-rate">
            <option value="1000">1 s</option>
            <option value="2000">2 s</option>
            <option value="5000">5 s</option>
            <option value="10000" selected>10 s</option>
            <option value="30000">30 s</option>
          </select>
        </label>
        <div class="status">
          <span class="dot" data-status="connecting"></span>
          <span data-bind="status-text">connecting…</span>
        </div>
      </div>
    </header>

    <section class="summary">
      <span data-bind="device-name">—</span>
      <span class="sep">·</span>
      <span data-bind="device-product">—</span>
      <span class="device-product-raw" data-bind="device-product-raw"></span>
      <span class="sep">·</span>
      <span>iOS <span data-bind="device-ios">—</span></span>
      <span class="sep">·</span>
      <span><span data-bind="process-count">—</span> processes</span>
      <span class="sep">·</span>
      <span><span data-bind="aggregate-cpu">—</span>% aggregate CPU</span>
      <span class="sep">·</span>
      <span><span data-bind="rss-total">—</span> MB resident</span>
      <span class="sep">·</span>
      <span class="battery" data-bind="battery-wrap">
        battery
        <span data-bind="battery-temp">—</span>°C
        <span class="battery-charge" data-bind="battery-charge"></span>
      </span>
    </section>

    <section class="table-wrap">
      <table class="proc-table">
        <thead>
          <tr>
            <th data-sort="pid" class="col-pid">PID</th>
            <th data-sort="name" class="col-name">Process</th>
            <th data-sort="cpu" class="col-cpu sorted desc">CPU %</th>
            <th class="col-spark">Trend</th>
            <th data-sort="rss_mb" class="col-mem">Mem MB</th>
            <th data-sort="threads" class="col-th">Th</th>
          </tr>
        </thead>
        <tbody data-bind="rows"></tbody>
      </table>
    </section>

    <div id="tooltip" class="tooltip" role="tooltip" aria-hidden="true"></div>

    <footer>
      <span
        >sort: click any column header, or press <kbd>c</kbd> <kbd>m</kbd>
        <kbd>n</kbd> <kbd>p</kbd></span
      >
      <span class="sep">·</span>
      <span>hover any row for a description</span>
      <span class="sep">·</span>
      <span>refresh <span data-bind="rate">—</span> ms</span>
    </footer>

    <script src="/static/devices.js"></script>
    <script src="/static/processes.js"></script>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
